select:
  - platform: template
    id: ${status_light_tag}_status_light
    name: ${status_light_name}
    disabled_by_default: true
    icon: "mdi:led-outline"
    options:
      - "Steady off"
      - "Blinking slow"
      - "Blinking fast"
      - "Steady on"
    update_interval: 1s
    lambda: |-
      uint8_t state = 0;
      auto error = id(user_control).read(&state, 1);
      if(error != ERROR_OK) {
        ESP_LOGW("status_light", "User controller read error: %d", error);
        return {};
      }
      ESP_LOGD("status_light", "User controller state: 0x%02X", state);
      state = (state & (0x03 << ${status_bit_shift})) >> ${status_bit_shift};
      return id(${status_light_tag}_status_light).at(state);
    set_action:
      - lambda: |-
          auto value = id(${status_light_tag}_status_light).index_of(x);
          if(!value.has_value()) {
            ESP_LOGW("status_light", "Unknown light option: %s", x.c_str());
            return;
          }
          uint8_t state = (value.value() << ${status_bit_shift}) | ${status_set_mask};
          auto error = id(user_control).write(&state, 1);
          if(error != ERROR_OK) {
            ESP_LOGW("status_light", "User controller write error: %d", error);
            return;
          }
          ESP_LOGD("status_light", "User controller set state: 0x%02X", state);
